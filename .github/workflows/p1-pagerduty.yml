name: P1 PagerDuty

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to reconcile
        required: true

permissions:
  issues: write

concurrency:
  group: p1-pagerduty-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    # issue_comment fires on PRs too — skip those.
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request == null }}
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PD_ROUTING_KEY: ${{ secrets.PAGERDUTY_ROUTING_KEY }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number =
              context.payload.issue?.number ??
              Number(context.payload.inputs?.issue_number);

            if (!issue_number) {
              core.setFailed('no issue number in event payload');
              return;
            }

            const routingKey = process.env.PD_ROUTING_KEY;
            if (!routingKey) {
              core.setFailed('PAGERDUTY_ROUTING_KEY secret not set');
              return;
            }

            const BOT_LOGINS = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
            ]);

            const PAGED_LABEL = 'pd:paged';
            const pagedLabelMeta = {
              color: 'b60205',
              description: 'PagerDuty P1 incident triggered for this issue',
            };

            const ensureLabel = async (name, meta) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status !== 404) throw e;
                await github.rest.issues.createLabel({
                  owner, repo, name,
                  color: meta.color,
                  description: meta.description,
                });
              }
            };

            const dedupKey = `${owner}/${repo}#${issue_number}`;

            const sendPdEvent = async (action, payload) => {
              const body = {
                routing_key: routingKey,
                event_action: action,
                dedup_key: dedupKey,
                ...(payload ? { payload } : {}),
              };
              const res = await fetch('https://events.pagerduty.com/v2/enqueue', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify(body),
              });
              if (!res.ok) {
                const text = await res.text();
                throw new Error(`PagerDuty ${action} failed: ${res.status} ${text}`);
              }
              return res.json();
            };

            // Pull the current state of the issue — payload may be stale on workflow_dispatch.
            const { data: issue } = await github.rest.issues.get({
              owner, repo, issue_number,
            });

            const labels = issue.labels.map(l => (typeof l === 'string' ? l : l.name));
            const hasP1 = labels.includes('priority:p1-critical');
            const isPaged = labels.includes(PAGED_LABEL);
            const isOpen = issue.state === 'open';

            // Any non-bot comment counts as human acknowledgment (matches sla-clock.yml).
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100,
            });
            const humanAcked = comments.some(c =>
              c.user && c.user.type !== 'Bot' && !BOT_LOGINS.has(c.user.login)
            );

            const shouldBePaged = hasP1 && isOpen && !humanAcked;

            if (shouldBePaged && !isPaged) {
              const component = labels.find(l => l.startsWith('component:')) || 'n/a';
              const network   = labels.find(l => l.startsWith('network:')) || 'n/a';
              const source    = labels.find(l => l.startsWith('source:')) || 'n/a';

              await sendPdEvent('trigger', {
                summary: `[P1] ${issue.title}`,
                source: `${owner}/${repo}#${issue_number}`,
                severity: 'critical',
                component,
                group: network,
                class: 'github-issue-p1',
                custom_details: {
                  issue_url: issue.html_url,
                  reporter: issue.user?.login ?? 'unknown',
                  component_label: component,
                  network_label: network,
                  source_label: source,
                  all_labels: labels,
                  body_excerpt: (issue.body || '').slice(0, 1024),
                },
                links: [{ href: issue.html_url, text: `${owner}/${repo}#${issue_number}` }],
              });

              await ensureLabel(PAGED_LABEL, pagedLabelMeta);
              await github.rest.issues.addLabels({
                owner, repo, issue_number, labels: [PAGED_LABEL],
              });

              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `**P1 paged via PagerDuty** — cc @shieldedtech/shielded-sre. Incident will auto-resolve when a human comments, the issue is closed, or \`priority:p1-critical\` is removed.`,
              });

              core.notice(`Triggered PagerDuty for #${issue_number} (dedup=${dedupKey})`);
              return;
            }

            if (!shouldBePaged && isPaged) {
              const reason =
                !hasP1 ? 'priority:p1-critical removed' :
                !isOpen ? 'issue closed' :
                humanAcked ? 'human comment' : 'unknown';

              await sendPdEvent('resolve');

              await github.rest.issues.removeLabel({
                owner, repo, issue_number, name: PAGED_LABEL,
              }).catch(() => {});

              core.notice(`Resolved PagerDuty for #${issue_number} (reason=${reason}, dedup=${dedupKey})`);
              return;
            }

            core.notice(`No PD state change for #${issue_number} (p1=${hasP1}, open=${isOpen}, acked=${humanAcked}, paged=${isPaged})`);
