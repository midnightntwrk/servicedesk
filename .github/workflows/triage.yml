name: Triage auto-label

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

concurrency:
  group: triage-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issue_number = context.payload.issue.number;
            const { owner, repo } = context.repo;

            const getSection = (heading) => {
              const re = new RegExp(`###\\s+${heading}\\s*\\n+([\\s\\S]*?)(?=\\n###\\s|$)`, 'i');
              const m = body.match(re);
              if (!m) return null;
              const value = m[1].trim();
              return value && value !== '_No response_' ? value : null;
            };

            // Maps issue-form values to canonical labels. Canonical names follow
            // shielded-sre-agent-docs/rules/github-label-conventions.md:
            //   - component:<v> values restricted to canonical-components.md
            //   - area:<v> for cross-cutting functional areas
            //   - priority:p[0-4]-<word> with full suffix
            //   - network:* and source:* are Layer 3 servicedesk-specific
            const componentMap = {
              'Infra — Node':                 'component:midnight-node',
              'Infra — Ledger':               'component:ledger',
              'Infra — Indexer':              'component:indexer',
              'Infra — Proof Server':         'component:proof-server',
              'Infra — ZK Circuits':          'component:zk',
              'Contracts — Compact Compiler': 'component:compact-compiler',
              'Contracts — ZKIR':             'component:zkir',
              'Contracts — Contract Runtime': 'component:compact-runtime',
              'App/SDK — Midnight.js SDK':    'component:midnight-js',
              'App/SDK — Wallet SDK':         'component:wallet-sdk',
              'App/SDK — DApp Connector':     'component:dapp-connector',
              'App/SDK — Faucet':             'component:faucet',
              'Interop — Partner Chains':     'component:partner-chains',
              'Interop — Bridge Contracts':   'component:bridge',
              'Ops — Deployment':             'area:deployment',
              'Ops — Metrics & Monitoring':   'area:metrics',
              'Ops — Build System':           'area:build',
              'Ops — Documentation':          'documentation',
            };

            const networkMap = {
              'Mainnet': 'network:mainnet',
              'Preprod': 'network:preprod',
              'Preview': 'network:preview',
            };

            const severityMap = {
              'P1': 'priority:p1-critical',
              'P2': 'priority:p2-high',
              'P3': 'priority:p3-medium',
              'P4': 'priority:p4-low',
            };

            const sourceMap = {
              'User / community report':  'source:user-report',
              'Grafana alert':            'source:grafana',
              'Chain anomaly detector':   'source:anomaly-detector',
              'Indexer lag':              'source:indexer-alert',
              'Internal test':            'source:internal-test',
              'Other':                    'source:other',
            };

            // Canonical colors per shielded-iac-modules/github/labels/locals.tf:
            //   component:* = d4c5f9 (purple), area:* = bfdadc (teal)
            //   priority:* per the canonical priority colour scale
            //   Layer-3 namespaces (network:, source:) use repo-local colours
            const labelMeta = {
              'component:midnight-node':     { color: 'd4c5f9', description: 'Midnight node binary (substrate-based)' },
              'component:ledger':            { color: 'd4c5f9', description: 'Ledger crate / library implementation of the on-chain state model' },
              'component:indexer':           { color: 'd4c5f9', description: 'Indexer service that exposes chain data to clients' },
              'component:proof-server':      { color: 'd4c5f9', description: 'Standalone proof-generation service' },
              'component:zk':                { color: 'd4c5f9', description: 'Zero-knowledge subsystem at large' },
              'component:compact-compiler':  { color: 'd4c5f9', description: 'The Compact language compiler' },
              'component:zkir':              { color: 'd4c5f9', description: 'Zero-knowledge intermediate representation' },
              'component:compact-runtime':   { color: 'd4c5f9', description: 'Runtime that executes compiled Compact contracts' },
              'component:midnight-js':       { color: 'd4c5f9', description: 'Browser/Node JavaScript SDK and provider implementations' },
              'component:wallet-sdk':        { color: 'd4c5f9', description: 'Wallet-SDK packages specifically' },
              'component:dapp-connector':    { color: 'd4c5f9', description: 'DApp Connector API and reference integrations' },
              'component:faucet':            { color: 'd4c5f9', description: 'Faucet service for development environments' },
              'component:partner-chains':    { color: 'd4c5f9', description: 'Partner-chains framework / integration code' },
              'component:bridge':            { color: 'd4c5f9', description: 'Cardano <-> Midnight bridge' },
              'area:deployment':             { color: 'bfdadc', description: 'Deployment and release operations (helm, argo, terraform, scripts)' },
              'area:metrics':                { color: 'bfdadc', description: 'Metrics, monitoring, and observability' },
              'area:build':                  { color: 'bfdadc', description: 'Build system and toolchain' },
              'documentation':               { color: '0075ca', description: 'Improvements or additions to documentation' },
              'network:mainnet':             { color: '5319e7', description: 'Network: Mainnet' },
              'network:preprod':             { color: '5319e7', description: 'Network: Preprod' },
              'network:preview':             { color: '5319e7', description: 'Network: Preview' },
              'priority:p1-critical':        { color: 'd93f0b', description: 'Critical priority — schedule immediately' },
              'priority:p2-high':            { color: 'e99695', description: 'High priority — schedule this sprint' },
              'priority:p3-medium':          { color: 'fbca04', description: 'Medium priority — schedule next sprint' },
              'priority:p4-low':             { color: '0e8a16', description: 'Low priority — schedule when capacity allows' },
              'source:user-report':          { color: 'c5def5', description: 'First seen: user / community report' },
              'source:grafana':              { color: 'c5def5', description: 'First seen: Grafana alert' },
              'source:anomaly-detector':     { color: 'c5def5', description: 'First seen: chain anomaly detector' },
              'source:indexer-alert':        { color: 'c5def5', description: 'First seen: indexer lag / data-quality alert' },
              'source:internal-test':        { color: 'c5def5', description: 'First seen: internal test / QA' },
              'source:other':                { color: 'c5def5', description: 'First seen: other source' },
            };

            const matchByPrefix = (value, map) => {
              if (!value) return null;
              for (const [prefix, label] of Object.entries(map)) {
                if (value.startsWith(prefix)) return label;
              }
              return null;
            };

            const component = getSection('Component');
            const network   = getSection('Network');
            const severity  = getSection('Severity');
            const firstSeen = getSection('First seen where\\?');

            const desired = new Set();
            const compLabel = matchByPrefix(component, componentMap);
            if (compLabel) desired.add(compLabel);

            const netLabel = matchByPrefix(network, networkMap);
            if (netLabel) desired.add(netLabel);

            if (severity) {
              const token = severity.trim().split(/\s+/)[0];
              if (severityMap[token]) desired.add(severityMap[token]);
            }

            const srcLabel = matchByPrefix(firstSeen, sourceMap);
            if (srcLabel) desired.add(srcLabel);

            for (const name of desired) {
              const meta = labelMeta[name];
              if (!meta) continue;
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo, name,
                    color: meta.color,
                    description: meta.description,
                  });
                } else {
                  throw e;
                }
              }
            }

            const managedPrefixes = ['component:', 'area:', 'network:', 'priority:', 'source:'];
            const current = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            for (const lbl of current.data) {
              const isManaged = managedPrefixes.some(p => lbl.name.startsWith(p));
              if (isManaged && !desired.has(lbl.name)) {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: lbl.name });
              }
            }

            if (desired.size > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number,
                labels: [...desired],
              });
            }

            core.notice(`Applied labels: ${[...desired].join(', ') || '(none)'}`);
