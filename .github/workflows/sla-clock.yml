name: SLA clock

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch: {}

permissions:
  issues: write

concurrency:
  group: sla-clock
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;

            // Response targets in business hours, per the MSA support mandate.
            // Business day = 9 hours (09:00-18:00 GMT, Mon-Fri).
            // P1 is handled out-of-band via PagerDuty, not this workflow.
            const SLA_HOURS = {
              'priority:p2-high':   4,  // 4 business hours
              'priority:p3-medium': 9,  // 1 business day
              'priority:p4-low':   27,  // 3 business days
            };

            const BOT_LOGINS = new Set([
              'github-actions[bot]',
              'dependabot[bot]',
            ]);

            const labelMeta = {
              'sla:response-at-risk':  { color: 'fbca04', description: '80% of SLA response target reached, still unresponded' },
              'sla:response-breached': { color: 'b60205', description: 'SLA response target breached' },
            };

            // Business hours elapsed between two UTC Dates.
            // Skips non-BH windows in chunks instead of iterating minute-by-minute.
            const bhElapsed = (start, now) => {
              let totalMs = 0;
              const cursor = new Date(start.getTime());
              while (cursor < now) {
                const day = cursor.getUTCDay();
                const hour = cursor.getUTCHours();
                const inBH = day >= 1 && day <= 5 && hour >= 9 && hour < 18;

                if (inBH) {
                  const endOfBH = new Date(cursor.getTime());
                  endOfBH.setUTCHours(18, 0, 0, 0);
                  const chunkEnd = now < endOfBH ? now : endOfBH;
                  totalMs += chunkEnd.getTime() - cursor.getTime();
                  cursor.setTime(chunkEnd.getTime());
                } else {
                  const next = new Date(cursor.getTime());
                  if (day === 6) {
                    next.setUTCDate(next.getUTCDate() + 2);
                  } else if (day === 0) {
                    next.setUTCDate(next.getUTCDate() + 1);
                  } else if (hour >= 18) {
                    next.setUTCDate(next.getUTCDate() + 1);
                  }
                  next.setUTCHours(9, 0, 0, 0);
                  cursor.setTime(next.getTime());
                }
              }
              return totalMs / 3600000;
            };

            const ensureLabel = async (name) => {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status !== 404) throw e;
                const meta = labelMeta[name];
                await github.rest.issues.createLabel({
                  owner, repo, name,
                  color: meta.color,
                  description: meta.description,
                });
              }
            };

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', per_page: 100,
            });

            let checked = 0;
            let atRisk = 0;
            let breached = 0;

            for (const issue of openIssues) {
              if (issue.pull_request) continue;

              const labels = issue.labels.map(l => (typeof l === 'string' ? l : l.name));
              const prio = Object.keys(SLA_HOURS).find(p => labels.includes(p));
              if (!prio) continue;

              checked += 1;
              const threshold = SLA_HOURS[prio];
              const elapsed = bhElapsed(new Date(issue.created_at), new Date());

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number: issue.number, per_page: 100,
              });
              const hasHumanResponse = comments.some(c =>
                c.user && c.user.type !== 'Bot' && !BOT_LOGINS.has(c.user.login)
              );

              const currentSlaLabels = labels.filter(l => l.startsWith('sla:'));

              if (hasHumanResponse) {
                for (const name of currentSlaLabels) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name }).catch(() => {});
                }
                continue;
              }

              let desired = null;
              if (elapsed >= threshold) desired = 'sla:response-breached';
              else if (elapsed >= threshold * 0.8) desired = 'sla:response-at-risk';

              for (const name of currentSlaLabels) {
                if (name !== desired) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issue.number, name }).catch(() => {});
                }
              }

              if (!desired) continue;
              if (currentSlaLabels.includes(desired)) continue;

              await ensureLabel(desired);
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issue.number, labels: [desired],
              });

              if (desired === 'sla:response-at-risk') atRisk += 1;
              if (desired === 'sla:response-breached') {
                breached += 1;
                // Render just the tier letter (e.g. "priority:p2-high" -> "P2") for the comment.
                const sev = prio.replace('priority:', '').split('-')[0].toUpperCase();
                await github.rest.issues.createComment({
                  owner, repo, issue_number: issue.number,
                  body: `**SLA response target breached** — ${sev} issue has been open for ${elapsed.toFixed(1)} business hours without a response (target: ${threshold}h). cc @shieldedtech/shielded-sre`,
                });
              }
            }

            core.notice(`SLA clock checked ${checked} issues — at-risk: ${atRisk}, breached: ${breached}`);
